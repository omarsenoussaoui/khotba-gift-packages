services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5050:5050"
    environment:
      - AllowedOrigins=http://localhost:8080
      - AdminKey=dar-el-khotba-admin-2026
    volumes:
      - db-data:/app/data
      - uploads:/app/wwwroot/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5050/api
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  db-data:
  uploads:
