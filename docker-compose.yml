services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3050:5050"
    environment:
      - AllowedOrigins=http://62.169.24.169:3080
      - AdminKey=dar-el-khotba-admin-2026
    volumes:
      - db-data:/app/data
      - uploads:/app/wwwroot/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://62.169.24.169:3050/api
    ports:
      - "3080:8080"
    depends_on:
      - backend

volumes:
  db-data:
  uploads:
